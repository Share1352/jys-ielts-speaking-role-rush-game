services:
  - type: web
    name: jys-ielts-speaking-role-rush
    env: node
    plan: free
    buildCommand: npm install --production=false && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
